services:
  - type: web
    name: verdict-backend
    env: node
    plan: free
    rootDir: backend
    buildCommand: npm install && npm run build
    startCommand: node dist/index.js
    envVars:
      - key: PORT
        value: 5000
      - key: NODE_ENV
        value: production
      - key: MONGODB_URI
        sync: false
        description: "Your MongoDB Atlas connection URL (mongodb+srv://...)"
      - key: UPSTASH_REDIS_REST_URL
        sync: false
        description: "Your Upstash Serverless Redis REST URL (https://...)"
      - key: UPSTASH_REDIS_REST_TOKEN
        sync: false
        description: "Your Upstash Serverless Redis token string"
      - key: GEMINI_API_KEY
        sync: false
        description: "Your Google Generative AI API Key"
